<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Getshop Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f8f9fa;
    padding: 30px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    font-weight: bold;
    color: #333;
}

.card {
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    border: none;
}

.cart-item {
    padding: 12px;
    border-bottom: 1px solid #ddd;
    font-size: 16px;
}

.remove-btn {
    float: right;
}

.total-box {
    font-size: 20px;
    font-weight: bold;
    margin-top: 20px;
    color: #198754;
}

.back-btn {
    margin-bottom: 20px;
}

label {
    font-weight: 600;
    margin-bottom: 5px;
}

h4 {
    margin-bottom: 20px;
    font-weight: bold;
}
</style>

<script>
let cart = [];

function loadCart() {
    let savedCart = localStorage.getItem("cart");

    if (savedCart) {
        cart = JSON.parse(savedCart);
    }

    displayCart();
}


function saveCart() {
    localStorage.setItem("cart", JSON.stringify(cart));
}

function displayCart() {
    let cartList = document.getElementById("cartList");
    let total = 0;

    cartList.innerHTML = "";

    if (cart.length === 0) {
        cartList.innerHTML = "<p>Your cart is currently empty.</p>";
    }

    for (let i = 0; i < cart.length; i++) {
        total += Number(cart[i].prod_price);

        cartList.innerHTML += `
            <div class="cart-item">
                <strong>${cart[i].prod_name}</strong>
                - ₱${cart[i].prod_price}

                <button
                    class="btn btn-sm btn-danger remove-btn"
                    onclick="removeItem(${i})">
                    Remove
                </button>
            </div>
        `;
    }

    document.getElementById("total").innerHTML =
        "Total: ₱" + total;

    document.getElementById("cust_order").value =
        JSON.stringify(cart);
}

function removeItem(index) {
    cart.splice(index, 1);
    saveCart();
    displayCart();
}

function prepareCheckout() {
    document.getElementById("cust_order").value =
        JSON.stringify(cart);
}

function addToCart(name, price) {
    let storedCart = JSON.parse(localStorage.getItem("cart")) || [];

    let item = {
        prod_name: name,
        prod_price: price
    };

    storedCart.push(item);

    localStorage.setItem("cart", JSON.stringify(storedCart));

    alert(name + " has been added to your cart!");
}
</script>
</head>
<body onload="loadCart()">
<h1> Your Shopping Cart</h1>
<a href="index.html" class="btn btn-secondary back-btn"> ← Back to Main Page </a>
<div class="container">
    <div class="row">
        <div class="col-md-6">
            <div class="card p-4">
                <h2>Your Items</h2>

                <div id="cartList"></div>

                <div id="total" class="total-box">
                    Total: ₱0
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-4">
                <h2>Checkout Form</h2>

                <form
                    action="http://52.74.133.173/cs3/checkout.php"
                    method="POST"
                    onsubmit="prepareCheckout()"
                >
                    <label>Full Name</label>
                    <input
                        type="text"
                        name="cust_name"
                        class="form-control mb-3"
                        placeholder="Enter your full name"
                        required
                    >
                    <label>Delivery Address</label>
                    <input
                        type="text"
                        name="cust_addr"
                        class="form-control mb-3"
                        placeholder="Enter your complete address"
                        required
                    >
                    <label>Email Address</label>
                    <input
                        type="email"
                        name="cust_email"
                        class="form-control mb-3"
                        placeholder="Enter your email address"
                        required
                    >
                    <input
                        type="hidden"
                        name="cust_order"
                        id="cust_order"
                    >
                    <button type="submit" class="btn btn-success w-100"> Proceed to Checkout </button>
                </form>
            </div>
        </div>

    </div>
</div>

</body>
</html>
